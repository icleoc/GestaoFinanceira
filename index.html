<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA FINANCEIRO LÉO - V38</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f3f4f6; font-family: 'Inter', sans-serif; color: #1e293b; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .form-input { width: 100%; border: 1px solid #cbd5e1; border-radius: 6px; padding: 8px 12px; font-size: 13px; }
        .modal-bg { background-color: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        .seta-rot { transition: transform 0.3s ease; }
        .seta-rot.fechado { transform: rotate(-90deg); }
        .progress-container:hover .tooltip-valor { opacity: 1; visibility: visible; }
        .tooltip-valor { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 2px 6px; border-radius: 4px; font-size: 9px; opacity: 0; visibility: hidden; transition: 0.2s; z-index: 20; }
    </style>
</head>
<body class="p-4 md:p-8 max-w-[1200px] mx-auto antialiased">

    <div id="toast-container" class="fixed bottom-6 right-6 z-[150] flex flex-col gap-2"></div>

    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h1 class="text-2xl font-black text-gray-900 uppercase tracking-tighter">SISTEMA FINANCEIRO LÉO</h1>
        <div class="flex gap-2 flex-wrap justify-center">
            <button onclick="abrirContas()" class="bg-emerald-100 text-emerald-800 text-xs font-bold py-2 px-4 rounded shadow-sm">🏦 CONTAS</button>
            <button onclick="abrirParcelas()" class="bg-orange-100 text-orange-800 text-xs font-bold py-2 px-4 rounded shadow-sm">💳 PARCELAS</button>
            <button onclick="abrirFixas()" class="bg-purple-100 text-purple-800 text-xs font-bold py-2 px-4 rounded shadow-sm">🗓️ FIXAS</button>
            <button onclick="abrirHistorico()" class="bg-blue-600 text-white text-xs font-bold py-2 px-4 rounded shadow-md">📜 EXTRATO</button>
            <button onclick="abrirCategorias()" class="bg-gray-800 text-white text-xs font-bold py-2 px-4 rounded shadow-sm">⚙️ CATEGORIAS</button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-[#102a43] text-white p-5 rounded-xl"><p class="text-[10px] uppercase font-bold opacity-70">Patrimônio Líquido</p><h2 class="text-2xl font-bold" id="kpi-patrimonio">R$ 0,00</h2></div>
        <div class="bg-white p-5 rounded-xl card-shadow"><p class="text-[10px] uppercase font-bold text-gray-400">Bancos</p><h2 class="text-2xl font-bold text-emerald-600" id="kpi-bancos">R$ 0,00</h2></div>
        <div class="bg-white p-5 rounded-xl card-shadow"><p class="text-[10px] uppercase font-bold text-gray-400">Dívida Cartões</p><h2 class="text-2xl font-bold text-red-600" id="kpi-divida">R$ 0,00</h2></div>
        <div class="bg-white p-5 rounded-xl card-shadow"><p class="text-[10px] uppercase font-bold text-gray-400">Investimentos</p><h2 class="text-2xl font-bold text-blue-600" id="kpi-invest">R$ 0,00</h2></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-white rounded-xl p-4 card-shadow">
                <div class="flex justify-between items-center cursor-pointer" onclick="toggleSection('lista-bancos','s1')">
                    <span class="font-bold text-emerald-700 text-sm uppercase">🏦 Bancos / Liquidez</span><span id="s1" class="seta-rot">▼</span>
                </div>
                <div id="lista-bancos" class="mt-4 space-y-2 overflow-hidden transition-all duration-300"></div>
            </div>
            
            <div class="bg-white rounded-xl p-4 card-shadow">
                <div class="flex justify-between items-center cursor-pointer" onclick="toggleSection('lista-cartoes-container','s2')">
                    <span class="font-bold text-orange-700 text-sm uppercase">💳 Cartões de Crédito</span><span id="s2" class="seta-rot">▼</span>
                </div>
                <div id="lista-cartoes-container" class="mt-4 space-y-6 overflow-hidden transition-all duration-300">
                    <div id="lista-cartoes"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white rounded-xl p-6 card-shadow border-t-4 border-[#102a43]">
                <h3 class="text-sm font-bold mb-4 uppercase text-gray-600">Novo Lançamento</h3>
                <form id="form-transacao" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold">🗓️ DATA</label><input type="date" id="input-data" class="form-input font-bold bg-gray-50" required></div>
                        <div><label class="text-[10px] font-bold">CATEGORIA</label><select id="select-cat" class="form-input font-bold bg-gray-800 text-white"></select></div>
                    </div>
                    <div id="box-fixa-resumo" class="hidden bg-purple-50 p-3 rounded border border-purple-100 flex justify-between">
                        <span id="txt-fixa-nome" class="font-bold text-purple-700 text-xs uppercase"></span>
                        <span id="txt-fixa-valor" class="font-bold text-purple-900"></span>
                    </div>
                    <div id="box-desc-valor" class="grid grid-cols-3 gap-3">
                        <div class="col-span-2"><label class="text-[10px] font-bold">DESCRIÇÃO</label><input type="text" id="input-desc" class="form-input" onclick="limparSeSugerido(this)" required></div>
                        <div><label class="text-[10px] font-bold">VALOR LÍQ.</label><input type="number" id="input-valor" step="0.01" class="form-input font-bold" required></div>
                    </div>
                    <div id="box-juros-cartao" class="p-3 bg-red-50 rounded border border-red-100 space-y-2">
                        <div class="flex items-center gap-2"><input type="checkbox" id="check-juros"><label class="text-[10px] font-bold text-red-800">TAXAS INFINITEPAY?</label></div>
                        <div id="sub-box-juros" class="hidden"><label class="text-[10px] font-bold text-red-600">VALOR BRUTO (TOTAL NA ORIGEM)</label><input type="number" id="input-valor-bruto" step="0.01" class="form-input border-red-200"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="text-[10px] font-bold">ORIGEM (SAI)</label><select id="select-conta" class="form-input"></select></div>
                        <div id="box-destino"><label class="text-[10px] font-bold text-emerald-600">DESTINO (ENTRA)</label><select id="select-destino" class="form-input border-emerald-200"></select></div>
                    </div>
                    <div id="box-parcelas" class="hidden"><label class="text-[10px] font-bold text-orange-600">PARCELAMENTO</label><select id="select-parcelas" class="form-input border-orange-200"></select></div>
                    <button type="submit" id="btn-submit" class="w-full bg-[#102a43] text-white font-bold py-3 rounded-lg hover:bg-blue-900 transition">PROCESSAR OPERAÇÃO</button>
                </form>
            </div>
            <div class="bg-white rounded-xl p-5 card-shadow flex justify-center"><canvas id="graficoVazamento" style="max-height: 200px;"></canvas></div>
        </div>
    </div>

    <div id="modal-historico" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-6xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <span class="font-bold text-sm uppercase tracking-widest">📜 Extrato Geral</span>
                <button onclick="fecharHistorico()" class="hover:text-red-400">✖ Fechar</button>
            </div>
            
            <div class="bg-gray-50 p-4 border-b grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1"><label class="text-[10px] font-bold text-gray-400 uppercase">Conta</label><select id="filtro-extrato-conta" class="form-input" onchange="carregarHistorico()"></select></div>
                <div class="md:col-span-1"><label class="text-[10px] font-bold text-gray-400 uppercase">Tipo</label><select id="filtro-extrato-tipo" class="form-input" onchange="carregarHistorico()"><option value="Todos">Todos</option><option value="Despesa">Despesas</option><option value="Receita">Receitas</option></select></div>
                
                <div class="md:col-span-2 flex justify-end">
                    <button id="btn-bulk-delete" onclick="deletarEmLote()" disabled class="bg-red-100 text-red-400 cursor-not-allowed text-[11px] px-6 py-2.5 rounded-full font-black uppercase transition-all duration-300">
                        🗑️ Excluir Selecionados (<span id="count-sel">0</span>)
                    </button>
                </div>
            </div>

            <div class="p-4 overflow-y-auto flex-1 scrollbar-hide">
                <table class="w-full text-left border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-[10px] text-gray-400 uppercase">
                            <th class="px-2 w-8 text-center"><input type="checkbox" id="master-check" onclick="toggleTodosChecks(this)"></th>
                            <th class="px-2 w-8"></th><th class="px-2 w-24">Data</th><th class="px-2">Descrição</th><th class="px-2 w-16">Parc.</th><th class="px-2">Conta</th><th class="px-2 text-right">Valor</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-historico" class="text-xs"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dqhyjrvhasmjwblidnqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxaHlqcnZoYXNtandibGlkbnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MjMwOTIsImV4cCI6MjA4ODI5OTA5Mn0.F13N0yyQPOlkiR_tNIhSd1gKerJew5mIuHrj4lIk3qU';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let contasGlobais = [], categoriasGlobais = [], transacoesGlobais = [], fixasGlobais = [], graficoInstance = null;

        function getHojeLocal() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        document.getElementById('input-data').value = getHojeLocal();

        const selP = document.getElementById('select-parcelas');
        for(let i = 1; i <= 24; i++) selP.add(new Option(i === 1 ? 'À vista' : `${i}x`, i));

        function toggleSection(id, s) { const l = document.getElementById(id); const seta = document.getElementById(s); l.classList.toggle('hidden'); seta.classList.toggle('fechado'); }
        function abrirHistorico() { document.getElementById('modal-historico').classList.remove('hidden'); carregarHistorico(); }
        function fecharHistorico() { document.getElementById('modal-historico').classList.add('hidden'); }
        
        // --- FUNÇÕES DE EXTRATO (V38: BOTÃO RECONFIGURADO) ---
        async function carregarHistorico() {
            const fC = document.getElementById('filtro-extrato-conta').value, fT = document.getElementById('filtro-extrato-tipo').value;
            let q = db.from('transacoes').select('id, data, descricao, valor, conta_origem_id, contas(nome)').order('data', { ascending: false }).limit(150);
            if(fC && fC !== 'Todos') q = q.eq('conta_origem_id', fC);
            if(fT === 'Despesa') q = q.lt('valor', 0); if(fT === 'Receita') q = q.gt('valor', 0);
            const { data } = await q;
            const tb = document.getElementById('tabela-historico'); tb.innerHTML = '';
            
            data.forEach(t => {
                let matches = t.descricao.match(/\((\d+\/\d+)\)$/);
                let parcela = matches ? matches[1] : '—';
                let descLimpa = matches ? t.descricao.replace(/\s\(\d+\/\d+\)$/, '') : t.descricao;
                tb.innerHTML += `
                    <tr class="bg-white border-b hover:bg-blue-50 transition">
                        <td class="p-3 text-center"><input type="checkbox" class="chk-item" value="${t.id}" onclick="syncBotaoDelete()"></td>
                        <td class="p-3"><button onclick="abrirEdicaoTr('${t.id}', '${descLimpa}', ${Math.abs(t.valor)})" class="text-blue-400">✏️</button></td>
                        <td class="p-3 font-medium text-gray-400">${t.data.split('-').reverse().join('/')}</td>
                        <td class="p-3 font-bold text-gray-700">${descLimpa}</td>
                        <td class="p-3 font-bold text-gray-300 italic">${parcela}</td>
                        <td class="p-3 text-gray-400 font-bold">${t.contas?.nome || 'Taxa/Juro'}</td>
                        <td class="p-3 text-right font-black ${t.valor < 0 ? 'text-red-600' : 'text-emerald-600'}">R$ ${Math.abs(t.valor).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    </tr>`;
            });
            syncBotaoDelete();
        }

        function toggleTodosChecks(m) { document.querySelectorAll('.chk-item').forEach(c => c.checked = m.checked); syncBotaoDelete(); }
        
        function syncBotaoDelete() {
            const checks = document.querySelectorAll('.chk-item:checked');
            const btn = document.getElementById('btn-bulk-delete');
            const count = document.getElementById('count-sel');
            count.innerText = checks.length;
            
            if(checks.length > 0) {
                btn.disabled = false;
                btn.className = "bg-red-600 text-white text-[11px] px-6 py-2.5 rounded-full font-black uppercase shadow-lg hover:bg-red-700 transition-all scale-105";
            } else {
                btn.disabled = true;
                btn.className = "bg-red-100 text-red-400 cursor-not-allowed text-[11px] px-6 py-2.5 rounded-full font-black uppercase transition-all duration-300";
            }
        }

        async function deletarEmLote() {
            const ids = Array.from(document.querySelectorAll('.chk-item:checked')).map(x => x.value);
            if(confirm(`⚠️ JARVIS: Confirmar exclusão de ${ids.length} itens? O saldo será estornado.`)) {
                await db.from('transacoes').delete().in('id', ids);
                location.reload();
            }
        }

        // --- RESTO DO JS (V37 FIXADO) ---
        async function carregarDados() {
            const [rCo, rCa, rTr, rFi] = await Promise.all([db.from('contas').select('*').order('nome'), db.from('categorias').select('*').order('nome'), db.from('transacoes').select('*'), db.from('despesas_fixas').select('*')]);
            contasGlobais = rCo.data; categoriasGlobais = rCa.data; transacoesGlobais = rTr.data; fixasGlobais = rFi.data;
            
            const selCat = document.getElementById('select-cat'); selCat.innerHTML = '<option value="Investimento">Investimentos</option><option value="Transferencia">Transferência</option>';
            const gD = document.createElement('optgroup'); gD.label = 'Despesas';
            const gR = document.createElement('optgroup'); gR.label = 'Receitas';
            categoriasGlobais.forEach(c => { const o = new Option(c.nome, c.id); if(c.tipo === 'Despesa') gD.appendChild(o); else gR.appendChild(o); });
            selCat.appendChild(gD); selCat.appendChild(gR);

            const selO = document.getElementById('select-conta'), selD = document.getElementById('select-destino'), selF = document.getElementById('filtro-extrato-conta');
            selO.innerHTML = ''; selD.innerHTML = ''; selF.innerHTML = '<option value="Todos">Todas as Contas</option>';
            contasGlobais.forEach(c => { selO.add(new Option(c.nome, c.id)); selD.add(new Option(c.nome, c.id)); selF.add(new Option(c.nome, c.id)); });

            renderizarContas();
        }

        function renderizarContas() {
            let sB=0, dC=0, iT=0; const diB=document.getElementById('lista-bancos'), diC=document.getElementById('lista-cartoes');
            diB.innerHTML=''; diC.innerHTML='';
            contasGlobais.forEach(c => {
                const s = parseFloat(c.saldo_atual) || 0;
                if(c.tipo === 'Corrente') { sB+=s; diB.innerHTML += `<div class="flex justify-between py-2 border-b text-xs font-bold"><span>› ${c.nome}</span><span class="text-emerald-600">R$ ${s.toLocaleString('pt-BR',{minimumFractionDigits:2})}</span></div>`; }
                if(c.tipo === 'Crédito') { 
                    dC+=s; const lim = parseFloat(c.limite_total) || 1; const us = Math.abs(s); const pU = Math.min((us/lim)*100, 100);
                    diC.innerHTML += `<div class="flex flex-col py-1"><div class="flex justify-between text-[10px] font-black uppercase mb-1"><span>${c.nome}</span><span>Disp: R$ ${(lim-us).toLocaleString('pt-BR')} | Venc: ${c.dia_vencimento}</span></div><div class="progress-container w-full bg-gray-200 h-2.5 rounded-full overflow-hidden shadow-inner"><div class="tooltip-valor">Devendo: R$ ${us.toLocaleString('pt-BR')}</div><div class="${pU>80?'bg-red-500':'bg-gray-800'} h-full transition-all duration-700" style="width:${pU}%"></div></div></div>`;
                }
                if(c.tipo === 'Investimento') { iT+=s; }
            });
            document.getElementById('kpi-patrimonio').innerText=`R$ ${(sB+dC+iT).toLocaleString('pt-BR')}`;
            document.getElementById('kpi-bancos').innerText=`R$ ${sB.toLocaleString('pt-BR')}`;
            document.getElementById('kpi-divida').innerText=`R$ ${Math.abs(dC).toLocaleString('pt-BR')}`;
            document.getElementById('kpi-invest').innerText=`R$ ${iT.toLocaleString('pt-BR')}`;
        }

        document.getElementById('form-transacao').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btn-submit'); btn.disabled = true;
            const op=document.getElementById('select-cat').value, ori=document.getElementById('select-conta').value, des=document.getElementById('select-destino').value, liq=parseFloat(document.getElementById('input-valor').value), dataB=document.getElementById('input-data').value, desc=document.getElementById('input-desc').value, comJ=document.getElementById('check-juros').checked, bruto=parseFloat(document.getElementById('input-valor-bruto').value)||liq, parc=parseInt(document.getElementById('select-parcelas').value)||1;
            try {
                if(op === 'Transferencia') {
                    let vP=bruto/parc, [a,m,d]=dataB.split('-');
                    for(let i=0;i<parc;i++){ let dp=new Date(a,parseInt(m)-1+i,d).toISOString().split('T')[0]; await db.from('transacoes').insert({data:dp,descricao:`${desc} (${i+1}/${parc})`,valor:-Math.abs(vP),conta_origem_id:ori}); }
                    await db.from('transacoes').insert({data:dataB,descricao:`Recebido: ${desc}`,valor:Math.abs(liq),conta_origem_id:des});
                    if(comJ && bruto>liq) await db.from('transacoes').insert({data:dataB,descricao:`Taxa: ${desc}`,valor:-(bruto-liq),conta_origem_id:null});
                } else if(op === 'Investimento') { await db.from('transacoes').insert([{data:dataB,valor:-liq,conta_origem_id:ori},{data:dataB,valor:liq,conta_origem_id:des}]); }
                else {
                    let vP=bruto/parc, [a,m,d]=dataB.split('-');
                    for(let i=0;i<parc;i++){ let dp=new Date(a,parseInt(m)-1+i,d).toISOString().split('T')[0]; await db.from('transacoes').insert({data:dp,descricao:parc>1?`${desc} (${i+1}/${parc})`:desc,valor:-Math.abs(vP),conta_origem_id:ori,categoria_id:op}); }
                    if(comJ && bruto > liq) await db.from('transacoes').insert({data:dataB,descricao:`Taxa: ${desc}`,valor:-(bruto-liq),conta_origem_id:null});
                }
                location.reload();
            } catch(err) { btn.disabled=false; }
        });

        carregarDados();
    </script>
</body>
</html>
